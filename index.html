<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baribaba | From Amar To Tomar, Baribaba is Shobar</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background:#f7f7f7; color:#222; }

    /* Navbar */
    header {
      background:#fff;
      padding:16px 60px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      box-shadow:0 2px 10px rgba(0,0,0,.06);
      position:sticky;
      top:0;
      z-index:100;
    }

    .brand {
      display:flex;
      align-items:center;
      gap:12px;
    }

    .brand img {
      height:45px;
    }

    .brand-name {
      font-size:24px;
      font-weight:700;
      color:#d81f26;
    }

    nav a {
      margin-left:25px;
      text-decoration:none;
      color:#222;
      font-weight:500;
    }

    nav a:hover { color:#d81f26; }

    /* Hero */
    .hero {
      background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
      url('assets/images/hero.jpg') center/cover no-repeat;
      height:85vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#fff;
      padding:20px;
    }

    .hero h1 { font-size:48px; margin-bottom:10px; }
    .hero p { font-size:18px; margin-bottom:30px; }

    /* Search Bar */
    .search-box {
      background:#fff;
      padding:20px;
      border-radius:10px;
      display:flex;
      gap:10px;
      max-width:900px;
      width:100%;
    }

    .search-box select,
    .search-box input {
      flex:1;
      padding:14px;
      border:1px solid #ddd;
      border-radius:6px;
    }

    .search-box button {
      background:#d81f26;
      color:#fff;
      border:none;
      padding:14px 30px;
      border-radius:6px;
      cursor:pointer;
      font-weight:600;
    }

    .search-box button:hover { background:#b5171c; }

    /* Section */
    section { padding:80px 60px; }

    .section-title {
      text-align:center;
      margin-bottom:50px;
    }

    .section-title h2 {
      font-size:36px;
      margin-bottom:10px;
    }

    .section-title p { color:#666; }

    /* Categories */
    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:25px;
    }

    .card {
      background:#fff;
      padding:30px;
      border-radius:12px;
      text-align:center;
      box-shadow:0 6px 20px rgba(0,0,0,.08);
    }

    /* Founders */
    .founders {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:40px;
    }

    .founder {
      background:#fff;
      padding:30px;
      border-radius:14px;
      box-shadow:0 8px 24px rgba(0,0,0,.08);
      text-align:center;
    }

    .founder img {
      width:130px;
      height:130px;
      border-radius:50%;
      object-fit:cover;
      margin-bottom:15px;
    }

    /* Footer */
    footer {
      background:#111;
      color:#aaa;
      padding:40px 60px;
      text-align:center;
    }

    .footer-social {
      margin-bottom:20px;
      display:flex;
      justify-content:center;
      gap:18px;
    }

    .footer-social a {
      width:42px;
      height:42px;
      border-radius:50%;
      background:#1f1f1f;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:18px;
      transition:all .3s ease;
      text-decoration:none;
    }

    .footer-social a:hover {
      background:#d81f26;
      transform:translateY(-4px);
    }

    /* WhatsApp Floating */
    .whatsapp {
      position:fixed;
      bottom:25px;
      right:25px;
      background:#25d366;
      color:#fff;
      padding:15px 18px;
      border-radius:50%;
      font-size:22px;
      text-decoration:none;
      box-shadow:0 4px 15px rgba(0,0,0,.3);
    }

    @media(max-width:768px){
      header { padding:16px 25px; }
      section { padding:60px 25px; }
      .hero h1 { font-size:34px; }
      .search-box { flex-direction:column; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <img src="assets/images/logo.png" alt="Baribaba Logo">
    <span class="brand-name">Baribaba</span>
  </div>
  <nav>
    <a href="index.html">Home</a>
    <a href="management.html">Management</a>
    <a href="services.html">Services</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<!-- REST OF YOUR PAGE IS UNCHANGED -->

</body>
</html>
