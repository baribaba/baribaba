<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reviews | Baribaba</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
    body { background:#f6f6f6; color:#222; }

    header {
      background:#fff;
      padding:16px 60px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      box-shadow:0 2px 10px rgba(0,0,0,.06);
    }

    header img { height:40px; }

    nav a {
      margin-left:25px;
      text-decoration:none;
      color:#222;
      font-weight:500;
    }

    nav a:hover { color:#d81f26; }

    .container {
      max-width:1100px;
      margin:auto;
      padding:60px;
    }

    h1 {
      font-size:32px;
      margin-bottom:10px;
    }

    .subtitle {
      color:#666;
      margin-bottom:40px;
    }

    /* Review Cards */
    .reviews {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:25px;
      margin-bottom:60px;
    }

    .review {
      background:#fff;
      padding:25px;
      border-radius:14px;
      box-shadow:0 6px 20px rgba(0,0,0,.08);
    }

    .review h3 {
      margin-bottom:6px;
      font-size:18px;
    }

    .stars {
      color:#f5a623;
      margin-bottom:10px;
      font-size:18px;
    }

    .review p {
      color:#555;
      line-height:1.6;
    }

    /* Review Form */
    .review-form {
      background:#fff;
      padding:30px;
      border-radius:16px;
      box-shadow:0 6px 20px rgba(0,0,0,.08);
    }

    .review-form h2 {
      margin-bottom:20px;
    }

    .review-form input,
    .review-form textarea,
    .review-form select {
      width:100%;
      padding:12px;
      margin-bottom:15px;
      border-radius:8px;
      border:1px solid #ccc;
      font-size:14px;
    }

    .review-form button {
      background:#d81f26;
      color:#fff;
      border:none;
      padding:12px 25px;
      border-radius:30px;
      font-size:15px;
      cursor:pointer;
    }

    .review-form button:hover {
      opacity:.9;
    }

    footer {
      background:#111;
      color:#aaa;
      text-align:center;
      padding:30px;
      margin-top:60px;
    }

    @media(max-width:768px){
      header, .container { padding:25px; }
    }
  </style>
</head>
<body>

<header>
  <img src="assets/images/logo.png" alt="Baribaba" />
  <nav>
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="reviews.html">Reviews</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div class="container">
  <h1>User Reviews</h1>
  <p class="subtitle">What people say about Baribaba</p>

  <!-- Reviews List -->
  <div class="reviews" id="reviewList"></div>

  <!-- Review Form -->
  <div class="review-form">
    <h2>Write a Review</h2>

    <input type="text" id="name" placeholder="Your Name" required />
    
    <select id="rating">
      <option value="5">⭐⭐⭐⭐⭐ (5)</option>
      <option value="4">⭐⭐⭐⭐ (4)</option>
      <option value="3">⭐⭐⭐ (3)</option>
      <option value="2">⭐⭐ (2)</option>
      <option value="1">⭐ (1)</option>
    </select>

    <textarea id="comment" rows="4" placeholder="Your review..." required></textarea>

    <button onclick="addReview()">Submit Review</button>
  </div>
</div>

<footer>
  <p>© 2026 Baribaba. All Rights Reserved.</p>
</footer>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const reviews = [
    { name: "Amit Sharma", rating: 5, comment: "Very smooth experience. Found my flat quickly!" },
    { name: "Sneha Roy", rating: 4, comment: "Good listings and responsive owners." }
  ];

  const reviewList = document.getElementById("reviewList");

  function renderReviews() {
    reviewList.innerHTML = "";
    reviews.forEach(r => {
      const div = document.createElement("div");
      div.className = "review";
      div.innerHTML = `
        <h3>${r.name}</h3>
        <div class="stars">${"⭐".repeat(r.rating)}</div>
        <p>${r.comment}</p>
      `;
      reviewList.appendChild(div);
    });
  }

  window.addReview = function () {
    const name = document.getElementById("name").value.trim();
    const rating = Number(document.getElementById("rating").value);
    const comment = document.getElementById("comment").value.trim();

    if (!name || !comment) {
      alert("Please fill all fields");
      return;
    }

    reviews.unshift({ name, rating, comment });
    renderReviews();

    document.getElementById("name").value = "";
    document.getElementById("comment").value = "";
  };

  renderReviews();
});
</script>

</body>
</html>
