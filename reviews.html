<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baribaba</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
    body { background:#f6f6f6; color:#222; }

    header {
      background:#fff;
      padding:16px 60px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      box-shadow:0 2px 10px rgba(0,0,0,.06);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header img { height:40px; }

    nav a {
      margin-left:25px;
      text-decoration:none;
      color:#222;
      font-weight:500;
    }

    nav a:hover { color:#d81f26; }

    /* Hero Section */
    .hero {
      background: url('assets/images/hero.jpg') center/cover no-repeat;
      height: 600px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #fff;
      padding: 0 20px;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .hero p {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .hero .search-bar {
      display: flex;
      flex-wrap: wrap;
      max-width: 900px;
      width: 100%;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,.1);
    }

    .hero .search-bar input,
    .hero .search-bar select {
      flex: 1;
      padding: 12px 15px;
      border: none;
      font-size: 14px;
    }

    .hero .search-bar button {
      background:#d81f26;
      color:#fff;
      border:none;
      padding:12px 25px;
      cursor:pointer;
      font-size: 15px;
    }

    /* Container for Reviews */
    .container {
      max-width:1100px;
      margin:auto;
      padding:60px 20px;
    }

    h2.section-title {
      font-size:32px;
      margin-bottom:10px;
      text-align: center;
    }

    .subtitle {
      color:#666;
      margin-bottom:40px;
      text-align: center;
    }

    /* Review Cards */
    .reviews {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:25px;
      margin-bottom:60px;
    }

    .review {
      background:#fff;
      padding:25px;
      border-radius:14px;
      box-shadow:0 6px 20px rgba(0,0,0,.08);
    }

    .review h3 {
      margin-bottom:6px;
      font-size:18px;
    }

    .stars {
      color:#f5a623;
      margin-bottom:10px;
      font-size:18px;
    }

    .review p {
      color:#555;
      line-height:1.6;
    }

    /* Review Form */
    .review-form {
      background:#fff;
      padding:30px;
      border-radius:16px;
      box-shadow:0 6px 20px rgba(0,0,0,.08);
      max-width:600px;
      margin: 0 auto;
    }

    .review-form h3 {
      margin-bottom:20px;
      text-align: center;
    }

    .review-form input,
    .review-form textarea,
    .review-form select {
      width:100%;
      padding:12px;
      margin-bottom:15px;
      border-radius:8px;
      border:1px solid #ccc;
      font-size:14px;
    }

    .review-form button {
      background:#d81f26;
      color:#fff;
      border:none;
      padding:12px 25px;
      border-radius:30px;
      font-size:15px;
      cursor:pointer;
      display: block;
      margin: 0 auto;
    }

    .review-form button:hover {
      opacity:.9;
    }

    footer {
      background:#111;
      color:#aaa;
      text-align:center;
      padding:30px;
      margin-top:60px;
    }

    @media(max-width:768px){
      header { padding: 15px 20px; }
      .hero h1 { font-size: 32px; }
      .hero p { font-size: 16px; }
    }
  </style>
</head>
<body>

<header>
  <img src="assets/images/logo.png" alt="Baribaba" />
  <nav>
    <a href="index.html">Home</a>
    <a href="management.html">Management</a>
    <a href="services.html">Services</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
    <a href="#reviews-section">Reviews</a>
  </nav>
</header>

<!-- Hero Section -->
<section class="hero">
  <h1>From Amar To Tomar, Baribaba is Shobar</h1>
  <p>Rent • Buy • Sell • Manage — All Real Estate Solutions in One Place</p>
  <div class="search-bar">
    <input type="text" placeholder="Enter Location">
    <select>
      <option>Property Type</option>
      <option>Apartment</option>
      <option>House</option>
    </select>
    <select>
      <option>Category</option>
      <option>Rent</option>
      <option>Buy</option>
    </select>
    <button>Search</button>
  </div>
</section>

<!-- Reviews Section -->
<div class="container" id="reviews-section">
  <h2 class="section-title">User Reviews</h2>
  <p class="subtitle">What people say about Baribaba</p>

  <!-- Reviews List -->
  <div class="reviews" id="reviewList"></div>

  <!-- Review Form -->
  <div class="review-form">
    <h3>Write a Review</h3>

    <input type="text" id="name" placeholder="Your Name" required />
    
    <select id="rating">
      <option value="5">⭐⭐⭐⭐⭐ (5)</option>
      <option value="4">⭐⭐⭐⭐ (4)</option>
      <option value="3">⭐⭐⭐ (3)</option>
      <option value="2">⭐⭐ (2)</option>
      <option value="1">⭐ (1)</option>
    </select>

    <textarea id="comment" rows="4" placeholder="Your review..." required></textarea>

    <button onclick="addReview()">Submit Review</button>
  </div>
</div>

<footer>
  <p>© 2026 Baribaba. All Rights Reserved.</p>
</footer>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const reviews = [
    { name: "Amit Sharma", rating: 5, comment: "Very smooth experience. Found my flat quickly!" },
    { name: "Sneha Roy", rating: 4, comment: "Good listings and responsive owners." }
  ];

  const reviewList = document.getElementById("reviewList");

  function renderReviews() {
    reviewList.innerHTML = "";
    reviews.forEach(r => {
      const div = document.createElement("div");
      div.className = "review";
      div.innerHTML = `
        <h3>${r.name}</h3>
        <div class="stars">${"⭐".repeat(r.rating)}</div>
        <p>${r.comment}</p>
      `;
      reviewList.appendChild(div);
    });
  }

  window.addReview = function () {
    const name = document.getElementById("name").value.trim();
    const rating = Number(document.getElementById("rating").value);
    const comment = document.getElementById("comment").value.trim();

    if (!name || !comment) {
      alert("Please fill all fields");
      return;
    }

    reviews.unshift({ name, rating, comment });
    renderReviews();

    document.getElementById("name").value = "";
    document.getElementById("comment").value = "";
  };

  renderReviews();
});
</script>

</body>
</html>
